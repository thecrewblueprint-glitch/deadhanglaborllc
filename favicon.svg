<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">

  <!-- Badge background -->
  <circle cx="16" cy="16" r="16" fill="#120d07"/>

  <!-- Outer red ring -->
  <circle cx="16" cy="16" r="14.8" fill="none" stroke="#9B1515" stroke-width="2.2"/>

  <!-- Inner ring (thin) -->
  <circle cx="16" cy="16" r="12.2" fill="none" stroke="#7a1010" stroke-width="0.6"/>

  <!-- Horizontal bar skeleton grips -->
  <line x1="9.5" y1="8.5" x2="22.5" y2="8.5" stroke="#d4c8a0" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Left arm (angled up to bar) -->
  <line x1="13.5" y1="8.5" x2="12" y2="11.5" stroke="#d4c8a0" stroke-width="1.1" stroke-linecap="round"/>
  <!-- Right arm (angled up to bar) -->
  <line x1="18.5" y1="8.5" x2="20" y2="11.5" stroke="#d4c8a0" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Skull -->
  <circle cx="16" cy="12.8" r="1.8" fill="#d4c8a0"/>
  <!-- Jaw hint -->
  <line x1="14.8" y1="14.2" x2="17.2" y2="14.2" stroke="#d4c8a0" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Spine -->
  <line x1="16" y1="14.6" x2="16" y2="21.5" stroke="#d4c8a0" stroke-width="0.9" stroke-linecap="round"/>

  <!-- Ribcage (3 pairs) -->
  <line x1="16" y1="15.8" x2="13.8" y2="17.2" stroke="#d4c8a0" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="16" y1="15.8" x2="18.2" y2="17.2" stroke="#d4c8a0" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="16" y1="17.5" x2="13.5" y2="18.7" stroke="#d4c8a0" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="16" y1="17.5" x2="18.5" y2="18.7" stroke="#d4c8a0" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="16" y1="19.2" x2="14" y2="20.2" stroke="#d4c8a0" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="16" y1="19.2" x2="18" y2="20.2" stroke="#d4c8a0" stroke-width="0.7" stroke-linecap="round"/>

  <!-- Pelvis bar -->
  <line x1="14" y1="21.5" x2="18" y2="21.5" stroke="#d4c8a0" stroke-width="0.9" stroke-linecap="round"/>

  <!-- Left leg -->
  <line x1="14.5" y1="21.5" x2="13" y2="26.5" stroke="#d4c8a0" stroke-width="1" stroke-linecap="round"/>
  <!-- Right leg -->
  <line x1="17.5" y1="21.5" x2="19" y2="26.5" stroke="#d4c8a0" stroke-width="1" stroke-linecap="round"/>

  <!-- Stars at bottom -->
  <polygon points="11,28.5 11.5,27.2 12,28.5 10.8,27.6 12.2,27.6" fill="#9B1515"/>
  <polygon points="16,29 16.6,27.4 17.2,29 15.8,27.9 17.4,27.9" fill="#9B1515"/>
  <polygon points="21,28.5 21.5,27.2 22,28.5 20.8,27.6 22.2,27.6" fill="#9B1515"/>

</svg>
